<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Car Dealership Review System</title>
    <link rel="stylesheet" href="/static/css/style.css">  <!-- ← FIXED CSS PATH -->
</head>
<body>
    <!-- FIXED NAVBAR - Contact Us ACTIVE -->
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/About.html">About</a></li>
            <li><a href="/Contact.html" class="active">Contact Us</a></li>  <!-- ← ACTIVE -->
        </ul>
    </nav>

    <main>
        <h1>Contact Us</h1>
        
        <!-- CONTACT DETAILS REQUIRED -->
        <section class="contact-info">
            <h2>Headquarters</h2>
            <p><strong>Address:</strong> 123 Auto Drive, Detroit, MI 48201</p>
            <p><strong>Phone:</strong> (800) 555-AUTO</p>
            <p><strong>Email:</strong> info@cardealership.com</p>
            <p><strong>Hours:</strong> Mon-Fri 9AM-8PM, Sat 10AM-6PM</p>
        </section>

        <!-- CONTACT FORM REQUIRED -->
        <section class="contact-form">
            <h2>Send us a message</h2>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>

        <!-- MAP IMAGE REQUIRED -->
        <section class="contact-map">
            <img src="https://via.placeholder.com/800x400/007bff/ffffff?text=Dealership+Locations+Map" 
                 alt="Dealership Locations Map">
        </section>
    </main>
</body>
</html>
