<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Car Dealership</title>
    <!-- ADD THIS MISSING BOOTSTRAP LINK -->
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Navigation - CONTACT ACTIVE -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="/">Car Dealership</a>
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/static/index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/static/About.html">About</a></li>
            <li class="nav-item active"><a class="nav-link" href="/static/Contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Contact Section -->
    <section class="contact py-5">
        <div class="container">
            <h2 class="text-center mb-5">Contact Us</h2>
            
            <!-- Contact Info -->
            <div class="row">
                <div class="col-md-6">
                    <h4>Visit Us</h4>
                    <img src="/static/images/dealership.jpg" alt="Dealership Location" class="img-fluid mb-3">
                    <p><strong>Address:</strong> 123 Auto Drive, Wichita, KS 67201</p>
                    <p><strong>Phone:</strong> (316) 555-0123</p>
                    <p><strong>Email:</strong> info@wichitaautodealer.com</p>
                </div>
                
                <!-- Contact Form -->
                <div class="col-md-6">
                    <h4>Send Message</h4>
                    <form>
                        <div class="form-group mb-3">
                            <input type="text" class="form-control" placeholder="Your Name">
                        </div>
                        <div class="form-group mb-3">
                            <input type="email" class="form-control" placeholder="Your Email">
                        </div>
                        <div class="form-group mb-3">
                            <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
